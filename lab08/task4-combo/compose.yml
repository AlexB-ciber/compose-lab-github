services:
  app:
    build: ./app
    ports:
      - "8010:8010"
    environment:
      LOG: "info"
      DATABASE_URL: "postgresql://demo:demo@db:5432/demo"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo

  tests:
    image: python:3.12-slim
    profiles:
      - test
    volumes:
      - ./tests:/tests
    working_dir: /tests
    # Встановлюємо залежності для тестів перед запуском
    command: sh -c "pip install pytest requests && python test_app.py"
